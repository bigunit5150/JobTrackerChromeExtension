<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      background: #4f46e5;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s ease;
    }

    button:hover {
      background: #4338ca;
    }

    button:active {
      background: #3730a3;
    }
  </style>
</head>
<body>
  <button id="captureBtn">Capture Job</button>
  <script src="popup.js"></script>
</body>
</html>
