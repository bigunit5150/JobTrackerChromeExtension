<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
    }

    .header {
      background: #1e293b;
      color: #ffffff;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
    }

    .body {
      padding: 16px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      background: #1e3a6e;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: #162d57;
    }

    button:active {
      background: #0f2240;
    }

    #statusText {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      min-height: 16px;
    }

    #statusText.warning {
      color: #d97706;
    }

    #statusText.duplicate {
      color: #b45309;
    }

    .footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #6b7280;
      text-decoration: none;
    }

    .footer a:hover {
      color: #374151;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">Job Tracker for Notion</div>
  <div class="body">
    <button type="button" id="captureBtn">Capture Job</button>
    <div id="statusText"></div>
  </div>
  <div class="footer">
    <a href="#" id="settingsLink">Settings</a>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
